name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build with Vite
        env:
          # Repo name on GitHub (the path under juanchiansaldi.github.io/).
          # If you use a custom domain, set VITE_BASE: '/'
          VITE_BASE: '/'
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run if not yet enabled (needs pages:write permission, already granted above)
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
